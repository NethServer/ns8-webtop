<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="none" />
  <meta name="color-scheme" content="light dark" />

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
  />

  <title>NethService Collaboration</title>
  <#if baseUrl??><base href="${baseUrl}" target="_blank"></#if>

  <link
    rel="icon"
    type="image/svg+xml"
    href="${coreResourcesImagesUrl}/favicon.ico"
  />

  <!-- Fallback favicon in case a browser does not support the SVG version -->
  <link rel="alternate icon" type="image/x-icon" href="${coreResourcesImagesUrl}/favicon.png">

  <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
  <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
  <!--[if lt IE 9]>
    <script src="${coreResourcesVendorUrl}/html5shiv/3.7.3/html5shiv.min.js"></script>
    <script src="${coreResourcesVendorUrl}/respond/1.4.2/respond.min.js"></script>
  <![endif]-->

  <!-- Tailwind CSS -->
  <script src="${coreResourcesVendorUrl}/tailwind/3.4.17/tailwind.min.js"></script>

  <style>
    body {
      background-image: url(${coreResourcesImagesUrl}/sfondo_service.svg);
      background-size: cover;
      background-repeat: no-repeat;
      overflow-x: hidden;
    }

    html {
      height: 100%;
      margin: 0;
      padding: 0;
    }
  </style>

  <!-- Jquery -->
  <script
    src="https://code.jquery.com/jquery-2.2.4.min.js"
    integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44="
    crossorigin="anonymous"
  ></script>
  <script type="text/javascript">
    const guessColorScheme = () => { return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light'; };

    function onBodyLoad() {
      setTimeout(function () {
        document.getElementById("wtfakecode").focus();
      }, 100);
    }

    function onFakecodeKeyPress(evt) {
      var e = evt || window.event,
          charCode = (e.which) ? e.which : e.keyCode;
      if (charCode === 13) {
        e.stopPropagation();
        e.preventDefault();
        submit();
      }

      // block all chars except numbers
      if (charCode < 48 || charCode > 57) {
        e.preventDefault();
      }
    }

    function onSubmitClick() {
      submit();
    }

    function submit() {
      // We need to implement this value swap in order to circumvent a
      // particular behaviour in FF: autocomplete='off' attribute is
      // ignored by default (see https://bugzilla.mozilla.org/show_bug.cgi?id=956906)
      var form = document.forms['login'],
          code = form['wtfakecode'].value,
          trust = form['wttrust'].checked;
      form.reset();
      form['wtcode'].value = code;
      form['wttrust'].checked = trust;
      form['colorscheme'].value = guessColorScheme();
      form.submit();
    }
  </script>
</head>

<body onload="onBodyLoad()">
  <div id="login" style="font-family: 'Poppins', sans-serif">
    <div class='absolute inset-0 z-[-5] hidden lg:block'>
    </div>
      <div class="w-1/2">
      <div class='absolute top-1/2 left-1/2 lg:left-40 transform -translate-y-1/2 -translate-x-1/2 lg:-translate-x-0'>
        <div class='border-gray-200 rounded-lg bg-gray-50 dark:bg-gray-900 dark:border-gray-500 p-10'>
          <div class="max-w-sm sm:w-96">
            <div class='flex flex-col items-center justify-center'>
              <picture>
                <source srcset="${coreResourcesImagesUrl}/logo-nethservice-white.svg" media="(prefers-color-scheme: light)"/>
                <source srcset="${coreResourcesImagesUrl}/logo-nethservice-dark.svg" media="(prefers-color-scheme: dark)"/>
                <img
                  src="${coreResourcesImagesUrl}/logo-nethservice-white.svg"
                  alt="logo"
                  class="mx-auto w-auto items-center object-contain object-bottom"
                  style="min-width: 300px; min-height: 36px; margin-bottom: 4px"
                />
              </picture>
              <div class="flex items-center justify-center text-orange-700 dark:text-orange-500 pt-4">
                Collaboration
              </div>
            </div>
            <div>
              <div class='relative py-4'>
                  <div class='absolute inset-0 flex items-center justify-center' aria-hidden='true'>
                      <div class='w-full border-t border-gray-300 dark:border-gray-500' style="max-width: 180px;"></div>
                  </div>
              </div>
              <div class="flex justify-center">
                <picture>
                  <source srcset="${coreResourcesImagesUrl}/login@light" media="(prefers-color-scheme: light)"/>
                  <source srcset="${coreResourcesImagesUrl}/login@dark" media="(prefers-color-scheme: dark)"/>
                  <img src="${coreResourcesImagesUrl}/login@light" alt="logo" class="mx-auto w-auto items-center object-contain object-bottom" style="max-height: 40px;">
                </picture>
              </div>
            </div>
            <div>
              <div class='relative py-4'>
                <div class='absolute inset-0 flex items-center justify-center' aria-hidden='true'>
                </div>
              </div>
              <div class="text-left mb-2">
                <h4 class="text-lg font-medium text-gray-900 dark:text-gray-200">${deliveryTitle}</h4>
              </div>
            </div>
            <div>
              <form name="login" method="post" class="space-y-6">
                <input id="colorscheme" name="colorscheme" type="hidden">
                <h5 class="text-left text-gray-600 dark:text-gray-200">${deliveryInfo}</h5>
                <#if showFailure>
                  <div class="border-l-4 rounded-md p-4 w-full flex border-rose-500 bg-rose-100">
                    <div class="flex-shrink-0" style="margin-top: 4px;">
                      <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="circle-xmark" class="svg-inline--fa fa-circle-xmark h-4 w-4 relative -top-0.5 text-rose-700" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM175 175c9.4-9.4 24.6-9.4 33.9 0l47 47 47-47c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9l-47 47 47 47c9.4 9.4 9.4 24.6 0 33.9s-24.6 9.4-33.9 0l-47-47-47 47c-9.4 9.4-24.6 9.4-33.9 0s-9.4-24.6 0-33.9l47-47-47-47c-9.4-9.4-9.4-24.6 0-33.9z"></path></svg>
                    </div>
                    <div class="ml-3">
                      <div class="text-sm text-rose-700">
                        <p>${failureMessage}</p>
                      </div>
                    </div>
                  </div>
                </#if>
                <div>
                  <label
                    for="otp"
                    class="block text-sm font-medium text-gray-700 dark:text-gray-200 pb-2"
                  >OTP</label>
                  <div class="input-group">
                    <input type="hidden" id="wtcode" name="wtcode">
                    <div class="text-left w-full">
                      <div class="relative">
                        <input
                          id="wtfakecode"
                          name="wtfakecode"
                          type="text"
                          placeholder="${codePlaceholder}"
                          class="block w-full relative focus:z-[8] disabled:cursor-not-allowed bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-50 disabled:border-gray-200 disabled:bg-gray-50 disabled:text-gray-500 rounded-md px-3 py-2 sm:text-sm ring-gray-300 dark:ring-gray-500 ring-1 focus:outline-none focus:ring-2 focus:ring-offset-0 focus:ring-orange-500 placeholder:text-gray-400 dark:placeholder-gray-500 <#if showFailure>ring-rose-500 focus:border-rose-500 focus:ring-rose-500</#if>"
                          autocomplete="off"
                          maxlength="6"
                          onkeypress="onFakecodeKeyPress(event)"
                        />
                      </div>
                    </div>
                    <br>
                    <#if showTrustCheckbox>
                      <div class="flex items-center -mt-2">
                        <input type="checkbox" id="wttrust" name="wttrust" value="true" class="h-4 w-4 text-orange-600 dark:text-orange-500 focus:ring-orange-500 border-gray-300 rounded">
                        <label for="wttrust" class="ml-2 block text-sm text-gray-900 dark:text-gray-200">
                          ${trustLabel}
                        </label>
                      </div>
                    </#if>
                    <div class="pt-6">
                      <button class="inline-flex content-center items-center justify-center font-medium tracking-wide transition-colors duration-200 transform focus:outline-none focus:ring-2 focus:z-20 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed border border-transparent bg-orange-700 dark:bg-orange-500 text-gray-50 dark:text-gray-950 focus:ring-orange-500 px-4 py-2 text-sm rounded-md w-full h-full" type="submit" onclick="onSubmitClick()">
                        ${submitLabel}
                      </button>
                    </div>
                  </div>
                </div>
              </form>
            </div>
            <div class="mt-6">
              <div class="flex justify-center">
                <picture>
                    <source srcset="${coreResourcesImagesUrl}/poweredby@light.svg" media="(prefers-color-scheme: light)"/>
                    <source srcset="${coreResourcesImagesUrl}/poweredby@dark.svg" media="(prefers-color-scheme: dark)"/>
                    <img src="${coreResourcesImagesUrl}/poweredby@light.svg" alt="logo" class="w-auto h-8" style="height: 30px;">
                </picture>
              </div>
              <div>
                <h5 class="text-center"><small>${versionString}</small></h5>
                <#if serverInfo??>
                  <h6 class="serverinfo text-center"><small>${serverInfo}</small></h6>
                </#if>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
